name: Nightly ESPA scrape

on:
  schedule:
    # 03:15 UTC = 06:15 Ελλάδας (θερινή ώρα) — τρέχει νύχτα, πριν ξυπνήσεις
    - cron: "15 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/espa_scraper.py --out data/programs.json --max-pages 29

      - name: Send KAD notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_SENDER_EMAIL: ${{ secrets.NOTIFY_SENDER_EMAIL }}
          APP_URL: ${{ secrets.APP_URL }}
        run: python scraper/notify_kad.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "govhub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/programs.json
          git diff --cached --quiet || git commit -m "chore: nightly ESPA data refresh [skip ci]"
          git push
